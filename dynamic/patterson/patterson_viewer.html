<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patterson Map Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#07070e;color:#ccc;font-family:monospace;overflow:hidden;}
#dropzone{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#07070e;z-index:100;transition:opacity .3s;}
#dropzone.hidden{opacity:0;pointer-events:none;}
#dropzone h1{font-size:22px;color:#88bbff;font-weight:400;}
#dropzone p{font-size:13px;color:#556;max-width:340px;text-align:center;line-height:1.6;}
#dropbox{width:320px;height:160px;border:1.5px dashed #334;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:border-color .2s,background .2s;}
#dropbox:hover,#dropbox.over{border-color:#5588ff;background:rgba(80,120,255,0.05);}
#dropbox span{font-size:13px;color:#667;}
#fileInput{display:none;}
#loadBtn{font-size:12px;padding:5px 16px;background:transparent;color:#88aaff;border:0.5px solid #334;border-radius:4px;cursor:pointer;}
#loadBtn:hover{border-color:#5588ff;color:#aaccff;}
#status{font-size:12px;color:#556;height:16px;}
#demoBtn{font-size:11px;padding:4px 12px;background:transparent;color:#446;border:0.5px solid #334;border-radius:4px;cursor:pointer;margin-top:4px;}
#demoBtn:hover{color:#88aaff;border-color:#5588ff;}
#main{position:fixed;inset:0;display:none;}
#c3d{width:100%;height:100%;display:block;}
#plane-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(7,7,20,.85);border:0.5px solid rgba(100,170,255,.4);border-radius:20px;padding:5px 14px;white-space:nowrap;z-index:20;}
#plane-bar label{font-size:11px;color:rgba(120,190,255,.8);}
#plane-bar input[type=range]{width:140px;cursor:pointer;}
#plane-bar span{font-size:11px;font-weight:500;font-family:monospace;color:rgba(100,230,255,.9);min-width:48px;}
#plane-bar select{font-size:11px;padding:1px 4px;background:#0d0d22;color:rgba(180,215,255,.85);border:0.5px solid rgba(100,150,255,.4);border-radius:3px;}
#fileinfo{position:absolute;top:10px;left:12px;font-size:11px;color:rgba(150,180,255,.5);z-index:20;line-height:1.6;}
#backBtn{position:absolute;top:10px;right:12px;font-size:11px;padding:4px 10px;background:transparent;color:rgba(150,180,255,.6);border:0.5px solid rgba(100,150,255,.3);border-radius:4px;cursor:pointer;z-index:20;}
#backBtn:hover{color:#aaccff;border-color:#5588ff;}

/* Peaks load button */
#peaksBtn{position:absolute;top:36px;right:12px;font-size:11px;padding:4px 10px;background:transparent;color:rgba(255,180,100,.6);border:0.5px solid rgba(255,150,80,.3);border-radius:4px;cursor:pointer;z-index:20;}
#peaksBtn:hover{color:#ffcc88;border-color:#ff9955;}
#peaksInput{display:none;}

/* Hover tooltip */
#tooltip{position:fixed;pointer-events:none;background:rgba(5,5,18,.92);border:0.5px solid rgba(100,200,255,.4);border-radius:6px;padding:6px 10px;font-size:11px;font-family:monospace;color:rgba(200,230,255,.9);z-index:200;display:none;line-height:1.7;}

#pip{position:absolute;bottom:54px;right:12px;width:220px;border:1px solid rgba(100,150,255,.55);border-radius:6px;overflow:hidden;background:#07070e;z-index:15;user-select:none;}
#pip-topbar{height:22px;background:rgba(15,20,50,.92);display:flex;align-items:center;gap:4px;padding:0 5px;cursor:move;flex-shrink:0;}
#pip-label{font-size:10px;color:rgba(150,190,255,.7);pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin:0 4px;}
#pip-resize-handle{width:16px;height:16px;cursor:nw-resize;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.45;}
#pip-resize-handle:hover{opacity:1;}
.pip-btn{width:18px;height:18px;cursor:pointer;flex-shrink:0;opacity:.5;background:none;border:none;padding:0;display:flex;align-items:center;justify-content:center;border-radius:3px;}
.pip-btn:hover{opacity:.9;background:rgba(255,255,255,.08);}
.pip-btn.active{opacity:1;}
.pip-btn.active svg *{stroke:#44ff88 !important;}
#pip-canvas-wrap{position:relative;overflow:hidden;background:#07070e;}
#sliceCanvas{position:absolute;top:0;left:0;display:block;}
#pip-readout{padding:2px 6px;background:rgba(8,8,20,.95);font-size:10px;font-family:monospace;color:rgba(160,200,255,.75);display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid rgba(100,150,255,.2);min-height:17px;flex-shrink:0;}
#pip-measure-info{font-size:10px;font-family:monospace;color:rgba(80,255,140,.85);padding:2px 6px;background:rgba(8,8,20,.95);border-top:0.5px solid rgba(80,255,140,.15);display:none;flex-shrink:0;}
#overlay{position:absolute;bottom:0;left:0;right:0;padding:6px 10px 8px;background:linear-gradient(transparent,rgba(5,5,12,.96) 28%);z-index:10;display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center;}
.cr{display:flex;align-items:center;gap:4px;}
.cr label{font-size:11px;color:rgba(255,255,255,.4);}
.cr span{font-size:11px;font-weight:500;min-width:28px;font-family:monospace;color:rgba(255,255,255,.65);}
.cr input[type=range]{width:72px;cursor:pointer;}
.cr select{font-size:11px;padding:1px 3px;background:#12122a;color:rgba(200,220,255,.8);border:0.5px solid rgba(100,150,255,.3);border-radius:3px;}
.div{width:.5px;height:18px;background:rgba(255,255,255,.1);}
/* Pair legend panel */
#legend-panel{position:absolute;left:12px;top:50px;width:260px;background:rgba(7,7,20,.92);border:0.5px solid rgba(100,150,255,.35);border-radius:8px;z-index:20;user-select:none;font-size:11px;font-family:monospace;}
#legend-topbar{height:24px;background:rgba(15,20,50,.95);display:flex;align-items:center;padding:0 8px;cursor:move;border-radius:8px 8px 0 0;gap:6px;}
#legend-topbar span{color:rgba(150,190,255,.75);font-size:11px;flex:1;}
#legend-toggle{font-size:10px;padding:2px 7px;background:transparent;color:rgba(150,180,255,.5);border:0.5px solid rgba(100,150,255,.3);border-radius:3px;cursor:pointer;}
#legend-toggle:hover{color:#aaccff;}
#legend-body{padding:6px 8px 8px;display:flex;flex-direction:column;gap:3px;}
#legend-body.collapsed{display:none;}
.legend-section{font-size:10px;color:rgba(120,160,255,.5);margin:4px 0 2px;letter-spacing:.5px;}
.pair-row{display:flex;align-items:center;gap:6px;padding:1px 0;}
.pair-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pair-label{flex:1;color:rgba(200,220,255,.8);}
.pair-zz{color:rgba(150,180,255,.5);min-width:28px;text-align:right;}
.pair-cb{cursor:pointer;accent-color:#44ffcc;}
#legend-sep{height:.5px;background:rgba(100,150,255,.2);margin:5px 0;}
.legend-ctrl{display:flex;align-items:center;gap:6px;margin:2px 0;}
.legend-ctrl label{color:rgba(200,220,255,.65);flex:1;}
.legend-ctrl input[type=range]{width:80px;cursor:pointer;}
.legend-ctrl span{color:rgba(180,220,255,.7);min-width:32px;}
.legend-ctrl input[type=checkbox]{cursor:pointer;accent-color:#44ffcc;}


/* Rotation sliders panel */
#rot-panel{position:absolute;left:12px;bottom:54px;background:rgba(7,7,20,.85);border:0.5px solid rgba(100,150,255,.3);border-radius:8px;padding:8px 12px;z-index:20;display:flex;flex-direction:column;gap:6px;}
#rot-panel label.hdr{font-size:10px;color:rgba(120,160,255,.6);margin-bottom:2px;}
.rot-row{display:flex;align-items:center;gap:6px;}
.rot-row label{font-size:11px;width:14px;text-align:right;}
.rot-row input[type=range]{width:100px;cursor:pointer;}
.rot-row span{font-size:10px;font-family:monospace;color:rgba(180,220,255,.7);min-width:36px;}
.rot-row button{font-size:10px;padding:1px 5px;background:transparent;color:rgba(150,180,255,.5);border:0.5px solid rgba(100,150,255,.3);border-radius:3px;cursor:pointer;}
.rot-row button:hover{color:#aaccff;}
</style>
</head>
<body>

<div id="dropzone">
  <h1>Patterson Map Viewer</h1>
  <div id="dropbox">
    <span>drag &amp; drop a .patt file here</span>
    <button id="loadBtn" onclick="document.getElementById('fileInput').click()">or browse files</button>
    <input type="file" id="fileInput" accept=".patt">
  </div>
  <p>Export .patt files from Python using <code>export_patterson.py</code></p>
  <div id="status"></div>
  <button id="demoBtn">load synthetic demo</button>
</div>

<div id="main">
  <canvas id="c3d"></canvas>

  <div id="plane-bar">
    <label>slice</label>
    <select id="selSliceAxis"><option value="x" selected>X</option><option value="y">Y</option><option value="z">Z</option></select>
    <input type="range" id="sSlicePos" min="0" max="63" value="32" step="1">
    <span id="vSlicePos">0.00</span>
  </div>

  <div id="fileinfo"></div>
  <button id="backBtn" onclick="showDropzone()">load new file</button>
  <button id="peaksBtn" onclick="document.getElementById('peaksInput').click()">load peaks (.json)</button>
  <input type="file" id="peaksInput" accept=".json">

  <div id="tooltip"></div>

  <!-- Rotation sliders -->
  <div id="rot-panel">
    <label class="hdr">rotate view</label>
    <div class="rot-row">
      <label style="color:#ff5566">X</label>
      <input type="range" id="rX" min="-180" max="180" value="0" step="1">
      <span id="vRX">0°</span>
      <button onclick="document.getElementById('rX').value=0;applyRotSliders()">↺</button>
    </div>
    <div class="rot-row">
      <label style="color:#33dd66">Y</label>
      <input type="range" id="rY" min="-180" max="180" value="0" step="1">
      <span id="vRY">0°</span>
      <button onclick="document.getElementById('rY').value=0;applyRotSliders()">↺</button>
    </div>
    <div class="rot-row">
      <label style="color:#3388ff">Z</label>
      <input type="range" id="rZ" min="-180" max="180" value="0" step="1">
      <span id="vRZ">0°</span>
      <button onclick="document.getElementById('rZ').value=0;applyRotSliders()">↺</button>
    </div>
  </div>

  <!-- Pair legend / filter panel -->
  <div id="legend-panel">
    <div id="legend-topbar">
      <span>peak pairs</span>
      <button id="legend-toggle" onclick="toggleLegend()">hide</button>
    </div>
    <div id="legend-body">
      <div class="legend-section">PAIR TYPES</div>
      <div id="pair-rows"><!-- filled by JS --></div>
      <div id="legend-sep"></div>
      <div class="legend-section">FILTERS</div>
      <div class="legend-ctrl">
        <label>d min (Å)</label>
        <input type="range" id="sPkDmin" min="0" max="10" value="0" step="0.1">
        <span id="vPkDmin">0.0</span>
      </div>
      <div class="legend-ctrl">
        <label>d max (Å)</label>
        <input type="range" id="sPkDmax" min="0.5" max="20" value="20" step="0.1">
        <span id="vPkDmax">20.0</span>
      </div>
      <div id="legend-sep2" style="height:.5px;background:rgba(100,150,255,.2);margin:5px 0;"></div>
      <div class="legend-section">OPTIONS</div>
      <div class="legend-ctrl">
        <label>scale size by weight</label>
        <input type="checkbox" id="chkPkScale">
      </div>
    </div>
  </div>

  <div id="pip">
    <div id="pip-topbar">
      <div id="pip-resize-handle" title="resize">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 11L11 1M1 6L6 1M1 11L6 11" stroke="white" stroke-width="1.3"/></svg>
      </div>
      <span id="pip-label">YZ @ x=0.00</span>
      <button class="pip-btn" id="homeBtn" title="reset zoom &amp; pan">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7L7 2L13 7" stroke="rgba(180,200,255,.75)" stroke-width="1.3" stroke-linejoin="round"/>
          <path d="M3 6V12H6V9H8V12H11V6" stroke="rgba(180,200,255,.75)" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="pip-btn" id="measureBtn" title="ruler — click pt1, click pt2, right-click to clear">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="0.5" y="4.5" width="13" height="5" rx="1" stroke="rgba(180,200,255,.75)" stroke-width="1.1"/>
          <line x1="3"    y1="4.5" x2="3"    y2="9.5" stroke="rgba(180,200,255,.75)" stroke-width="1"/>
          <line x1="5.5"  y1="4.5" x2="5.5"  y2="8"   stroke="rgba(180,200,255,.75)" stroke-width="1"/>
          <line x1="8"    y1="4.5" x2="8"    y2="9.5"  stroke="rgba(180,200,255,.75)" stroke-width="1"/>
          <line x1="10.5" y1="4.5" x2="10.5" y2="8"   stroke="rgba(180,200,255,.75)" stroke-width="1"/>
        </svg>
      </button>
    </div>
    <div id="pip-canvas-wrap"><canvas id="sliceCanvas"></canvas></div>
    <div id="pip-readout"><span id="readoutXY">—</span><span id="readoutVal">—</span></div>
    <div id="pip-measure-info"></div>
  </div>

  <div id="overlay">
    <div class="cr"><label>levels</label><input type="range" id="sLvls" min="2" max="14" value="7" step="1"><span id="vLvls">7</span></div>
    <div class="cr"><label>iso min</label><input type="range" id="sMin" min="5" max="70" value="18" step="1"><span id="vMin">18%</span></div>
    <div class="cr"><label>iso max</label><input type="range" id="sMax" min="30" max="98" value="88" step="1"><span id="vMax">88%</span></div>
    <div class="cr"><label>n slices</label><input type="range" id="sSlices" min="4" max="48" value="20" step="1"><span id="vSlices">20</span></div>
    <div class="cr"><label>opacity</label><input type="range" id="sOpa" min="10" max="100" value="72" step="1"><span id="vOpa">72%</span></div>
    <div class="div"></div>
    <div class="cr"><label>stack</label>
      <select id="selAxis"><option value="z">Z</option><option value="x">X</option><option value="zx" selected>Z+X</option></select>
    </div>
    <div class="cr"><label>plane</label><input type="checkbox" id="chkPlane" checked></div>
    <div class="cr"><label>spin</label><input type="checkbox" id="chkRot" checked></div>
    <div class="cr"><label>peak r</label><input type="range" id="sPkR" min="2" max="20" value="6" step="1"><span id="vPkR">6</span></div>
    <div class="cr"><label>pip size</label><input type="range" id="sPip" min="100" max="500" value="220" step="10"><span id="vPip">220</span></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── Peaks data ───────────────────────────────────────────────────────────────
let peaksData = null;
let peakSpheres = [];

// ── Pair colour palette ───────────────────────────────────────────────────────
// 10 visually distinct colours for all same-element and cross-element pairs
// among H, C, N, O, S, P, Cl, Br, etc. Assigned on first load by sorted pair key.
const PAIR_PALETTE = [
  '#44ffcc', // 0  C-C   teal
  '#4488ff', // 1  C-N   blue
  '#ff6644', // 2  C-O   orange-red
  '#aaaaaa', // 3  C-H   grey
  '#cc44ff', // 4  N-N   purple
  '#ff44aa', // 5  N-O   pink
  '#888888', // 6  N-H   dark grey
  '#ffdd00', // 7  O-O   yellow
  '#ff9933', // 8  O-H   amber
  '#556677', // 9  H-H   muted blue-grey
  '#00ffaa', // 10 extra
  '#ff3366', // 11 extra
  '#33ddff', // 12 extra
  '#ffaa00', // 13 extra
  '#aa44ff', // 14 extra
  '#44ff66', // 15 extra
];
let pairColorMap = {};    // "C-C" → hex string
let pairEnabledMap = {};  // "C-C" → bool
let legendCollapsed = false;

function canonPair(e1, e2){
  // Canonical sorted pair key, e.g. "C-O" not "O-C"
  return [e1, e2].sort().join('-');
}

function elemFromLabel(lbl){
  // Strip trailing digits to get element: "C1" → "C", "H2p" → "H"
  // Works for most crystallographic labels; fallback to first char(s)
  const m = lbl.match(/^([A-Z][a-z]?)/);
  return m ? m[1] : lbl[0];
}

function buildPairMaps(){
  pairColorMap = {};
  pairEnabledMap = {};
  if(!peaksData) return;
  let idx = 0;
  // First pass: collect unique pairs in order of appearance
  peaksData.forEach(pk=>{
    if(pk.label === 'origin') return;
    const e1 = elemFromLabel(pk.atom1);
    const e2 = elemFromLabel(pk.atom2);
    const key = canonPair(e1, e2);
    if(!(key in pairColorMap)){
      pairColorMap[key] = PAIR_PALETTE[idx % PAIR_PALETTE.length];
      pairEnabledMap[key] = true;
      idx++;
    }
  });
}

function pairKey(pk){
  if(pk.label === 'origin') return 'origin';
  const e1 = elemFromLabel(pk.atom1);
  const e2 = elemFromLabel(pk.atom2);
  return canonPair(e1, e2);
}

function pkColor(pk){
  if(pk.label === 'origin') return '#ffffff';
  const key = pairKey(pk);
  return pairColorMap[key] || '#44ffcc';
}

function pkEnabled(pk){
  if(pk.label === 'origin') return true;
  const key = pairKey(pk);
  if(!(key in pairEnabledMap)) return true;
  return pairEnabledMap[key];
}

function pkInDistRange(pk){
  if(pk.label === 'origin') return true;
  const dmin = parseFloat(document.getElementById('sPkDmin').value);
  const dmax = parseFloat(document.getElementById('sPkDmax').value);
  return pk.distance >= dmin && pk.distance <= dmax;
}

function toggleLegend(){
  legendCollapsed = !legendCollapsed;
  document.getElementById('legend-body').classList.toggle('collapsed', legendCollapsed);
  document.getElementById('legend-toggle').textContent = legendCollapsed ? 'show' : 'hide';
}

function hexToThree(hex){
  return parseInt(hex.replace('#',''), 16);
}

// Atomic numbers for Z*Z weight computation in JS
const ATOMIC_Z = {H:1,He:2,Li:3,Be:4,B:5,C:6,N:7,O:8,F:9,Ne:10,
  Na:11,Mg:12,Al:13,Si:14,P:15,S:16,Cl:17,Ar:18,K:19,Ca:20,
  Fe:26,Cu:29,Zn:30,Br:35,I:53};
function pairZZ(key){
  // key is like "C-O" or "Na-Cl"
  const [e1,e2] = key.split('-');
  const z1 = ATOMIC_Z[e1] || 6;
  const z2 = ATOMIC_Z[e2] || 6;
  return z1*z2;
}

function buildLegendRows(){
  const container = document.getElementById('pair-rows');
  container.innerHTML = '';
  // Sort pairs by Z*Z descending — computed from element symbols
  const sortedPairs = Object.keys(pairColorMap).sort((a,b)=>pairZZ(b)-pairZZ(a));
  sortedPairs.forEach(key=>{
    const w = pairZZ(key);
    const color = pairColorMap[key];
    const row = document.createElement('div');
    row.className = 'pair-row';
    row.innerHTML = `
      <div class="pair-swatch" style="background:${color};opacity:0.85;"></div>
      <span class="pair-label">${key}</span>
      <span class="pair-zz">Z²=${w}</span>
      <input type="checkbox" class="pair-cb" data-pair="${key}" ${pairEnabledMap[key]?'checked':''}>
    `;
    row.querySelector('input').addEventListener('change', function(){
      pairEnabledMap[this.dataset.pair] = this.checked;
      buildPeakSpheres();
      redrawSlice2D();
    });
    container.appendChild(row);
  });
  // Update dmax range based on actual data
  if(peaksData && peaksData.length > 1){
    const maxD = Math.max(...peaksData.filter(p=>p.label!=='origin').map(p=>p.distance));
    const dmax = document.getElementById('sPkDmax');
    dmax.max = Math.ceil(maxD + 1);
    dmax.value = dmax.max;
    document.getElementById('vPkDmax').textContent = parseFloat(dmax.value).toFixed(1);
  }
}

// ── File loading ──────────────────────────────────────────────────────────
let volumeData=null,volNX=0,volNY=0,volNZ=0,volLabel='';
function parsePatt(buffer){
  const dv=new DataView(buffer);
  const hdrLen=dv.getUint32(0,true);
  const hdr=new TextDecoder().decode(new Uint8Array(buffer,4,hdrLen)).trim().split('\n');
  if(hdr[0].trim()!=='PATT1')throw new Error('Not a valid .patt file');
  const[nx,ny,nz]=hdr[1].trim().split(' ').map(Number);
  return{data:new Float32Array(new Float32Array(buffer,4+hdrLen,nx*ny*nz)),nx,ny,nz,label:hdr[2]?.trim()||'unknown'};
}
function loadBuffer(buffer,filename){
  try{
    const r=parsePatt(buffer);
    volumeData=r.data;volNX=r.nx;volNY=r.ny;volNZ=r.nz;volLabel=r.label;
    document.getElementById('fileinfo').textContent=`${filename}  |  ${volNX}×${volNY}×${volNZ}  |  ${volLabel}`;
    const sl=document.getElementById('sSlicePos');sl.max=volNX-1;sl.value=Math.floor(volNX/2);
    showViewer();buildContours();
  }catch(e){document.getElementById('status').textContent='Error: '+e.message;}
}
function showDropzone(){document.getElementById('dropzone').classList.remove('hidden');document.getElementById('main').style.display='none';}
function showViewer(){document.getElementById('dropzone').classList.add('hidden');document.getElementById('main').style.display='block';resizeR();}
const dropzone=document.getElementById('dropzone'),dropbox=document.getElementById('dropbox');
['dragover','dragenter'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();dropbox.classList.add('over');}));
['dragleave','dragend'].forEach(ev=>dropzone.addEventListener(ev,()=>dropbox.classList.remove('over')));
dropzone.addEventListener('drop',e=>{e.preventDefault();dropbox.classList.remove('over');const f=e.dataTransfer.files[0];if(!f)return;document.getElementById('status').textContent='Loading '+f.name+'...';f.arrayBuffer().then(buf=>loadBuffer(buf,f.name));});

  const N=48;const data=new Float32Array(N*N*N);
  function dvi(i,j,k){return k*N*N+j*N+i;}

  [[.5,.5,.5,.07,1],[.63,.57,.53,.04,.55],[.37,.43,.47,.04,.55],[.55,.38,.61,.035,.40],[.45,.62,.39,.035,.40],[.70,.51,.43,.03,.28],[.30,.49,.57,.03,.28],[.58,.66,.35,.028,.22],[.42,.34,.65,.028,.22]].forEach(p=>gauss(...p));
  let mx=-1e9,mn=1e9;for(let n=0;n<data.length;n++){mx=Math.max(mx,data[n]);mn=Math.min(mn,data[n]);}

// ── Volume ────────────────────────────────────────────────────────────────
function vget(i,j,k){return volumeData?volumeData[k*volNY*volNX+j*volNX+i]||0:0;}
function extractSlice(ax,s){
  let A,B;
  if(ax==='x'){A=volNY;B=volNZ;}else if(ax==='y'){A=volNX;B=volNZ;}else{A=volNX;B=volNY;}
  const out=new Float32Array(A*B);
  for(let a=0;a<A;a++)for(let b=0;b<B;b++){
    if(ax==='x')out[a*B+b]=vget(s,a,b);else if(ax==='y')out[a*B+b]=vget(a,s,b);else out[a*B+b]=vget(a,b,s);
  }
  return{data:out,na:A,nb:B};
}
// fractional [0,1) → viewer [-0.5, 0.5]
function fracToViewer(f){return f-0.5;}
function sliceTo3D(ax,sf,f1,f2){
  const p=fracToViewer(sf),h=fracToViewer(f1),v=fracToViewer(f2);
  if(ax==='x')return new THREE.Vector3(p,h,v);
  if(ax==='y')return new THREE.Vector3(h,p,v);
  return new THREE.Vector3(h,v,p);
}

// ── Marching squares ──────────────────────────────────────────────────────
function marchingSquares(grid,nx,ny,thr){
  function lerp(v0,v1,p0,p1){return p0+(p1-p0)*Math.max(0,Math.min(1,(thr-v0)/((v1-v0)||1e-9)));}
  const segs=[];
  for(let i=0;i<nx-1;i++)for(let j=0;j<ny-1;j++){
    const v00=grid[i*ny+j],v10=grid[(i+1)*ny+j],v01=grid[i*ny+j+1],v11=grid[(i+1)*ny+j+1];
    let ci=0;if(v00>=thr)ci|=1;if(v10>=thr)ci|=2;if(v11>=thr)ci|=4;if(v01>=thr)ci|=8;
    if(ci===0||ci===15)continue;
    const fi=i/(nx-1),fi1=(i+1)/(nx-1),fj=j/(ny-1),fj1=(j+1)/(ny-1);
    const eB=[lerp(v00,v10,fi,fi1),fj],eT=[lerp(v01,v11,fi,fi1),fj1];
    const eL=[fi,lerp(v00,v01,fj,fj1)],eR=[fi1,lerp(v10,v11,fj,fj1)];
    const lut={1:[[eB,eL]],2:[[eB,eR]],3:[[eL,eR]],4:[[eT,eR]],5:[[eB,eL],[eT,eR]],6:[[eB,eT]],7:[[eT,eL]],8:[[eT,eL]],9:[[eB,eT]],10:[[eB,eR],[eT,eL]],11:[[eT,eR]],12:[[eL,eR]],13:[[eB,eR]],14:[[eB,eL]]};
    for(const[a,b]of(lut[ci]||[]))segs.push([a[0],a[1],b[0],b[1]]);
  }
  return segs;
}

// ── Colour ────────────────────────────────────────────────────────────────
function levelColorThree(t){if(t<.25){const s=t/.25;return new THREE.Color(.15,.35+s*.45,1);}if(t<.5){const s=(t-.25)/.25;return new THREE.Color(.15,.8,1-s*.8);}if(t<.75){const s=(t-.5)/.25;return new THREE.Color(.15+s*.85,.8-s*.3,.2);}const s=(t-.75)/.25;return new THREE.Color(1,.5-s*.35,.2-s*.15);}
function levelColorCSS(t){const c=levelColorThree(t);return`rgb(${c.r*255|0},${c.g*255|0},${c.b*255|0})`;}
function hotRGB(t){return[Math.min(255,t*2.5*255|0),Math.max(0,Math.min(255,(t-.4)*2.5*255|0)),Math.max(0,Math.min(255,(t-.7)*3.3*255|0))];}

// ── Label helper ──────────────────────────────────────────────────────────
function drawLabel(ctx,text,x,y,opts){
  const fs=opts.fontSize||10;ctx.font=`${fs}px monospace`;
  const pad=3,tw=ctx.measureText(text).width,bw=tw+pad*2,bh=fs+pad*2;
  const ox=opts.offsetX||0,oy=opts.offsetY||0;
  let bx=x+ox,by=y+oy-bh;
  if(opts.align==='right')bx=x+ox-bw;if(opts.align==='center')bx=x+ox-bw/2;
  const W=ctx.canvas.width,H=ctx.canvas.height;
  bx=Math.max(1,Math.min(W-bw-1,bx));by=Math.max(1,Math.min(H-bh-1,by));
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.beginPath();const r=3;
  ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r);ctx.lineTo(bx+bw,by+bh-r);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh);ctx.lineTo(bx+r,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r);ctx.lineTo(bx,by+r);ctx.quadraticCurveTo(bx,by,bx+r,by);ctx.closePath();
  ctx.fill();ctx.strokeStyle='rgba(68,255,136,.35)';ctx.lineWidth=.7;ctx.stroke();
  ctx.fillStyle='#44ff88';ctx.fillText(text,bx+pad,by+pad+fs-1);
}

// In viewer space, (0,0,0) is already the centre of the cube [-0.5,0.5]³
// We draw thick axes as thin cylinders so they show up properly

function makeCylAxis(dir, color, len=0.52){
  // dir: THREE.Vector3 unit direction
  // A cylinder by default points along Y. Rotate it to point along dir.
  const geo = new THREE.CylinderGeometry(0.006, 0.006, len, 8);
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.85});
  const mesh = new THREE.Mesh(geo, mat);
  // offset: centre of cylinder is at len/2 along dir from origin
  mesh.position.copy(dir.clone().multiplyScalar(len/2));
  // rotate Y→dir
  const yAxis = new THREE.Vector3(0,1,0);
  const q = new THREE.Quaternion().setFromUnitVectors(yAxis, dir.clone().normalize());
  mesh.quaternion.copy(q);
  return mesh;
}

function makeArrowHead(dir, color, len=0.52){
  const geo = new THREE.ConeGeometry(0.018, 0.06, 8);
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.9});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(dir.clone().multiplyScalar(len + 0.03));
  const yAxis = new THREE.Vector3(0,1,0);
  const q = new THREE.Quaternion().setFromUnitVectors(yAxis, dir.clone().normalize());
  mesh.quaternion.copy(q);
  return mesh;
}

// ── Peak spheres ──────────────────────────────────────────────────────────
let peakGroup=null;

// Weight -> radius scaling
// Scaling: radius = rBase * weight^PK_W_EXP  (no additive offset)
// weight = ZZ/ZZmax in [0,1]; O-O=1.0, H-H=0.016
// exp=1.0: true linear (1:64 ratio), exp=0.5: sqrt (1:8 ratio, H peaks still visible)
const PK_W_EXP = 1.0;
const PK_W_FLOOR = 0.01;  // minimum scale so zero-weight peaks aren't invisible

function peakRadiusScale(weight){
  // Unchecked: uniform size 1.0 for all peaks.
  // Checked: radius proportional to (ZZ/ZZmax)^exp — true to Patterson physics.
  //   O-O (weight=1.0) → scale=1.0 (full rBase)
  //   H-H (weight=0.016) → scale=0.016 (tiny dot, linear) or 0.125 (sqrt)
  const scaled = document.getElementById('chkPkScale') && document.getElementById('chkPkScale').checked;
  if(!scaled || weight==null) return 1.0;
  return Math.max(PK_W_FLOOR, Math.pow(Math.max(0, Math.min(1, weight)), PK_W_EXP));
}

function buildPeakSpheres(){
  if(peakGroup){pivot.remove(peakGroup);peakGroup.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});}
  peakGroup=new THREE.Group();
  peakSpheres=[];
  if(!peaksData)return;
  const rBase=parseInt(document.getElementById('sPkR').value)/1000;
  peaksData.forEach(pk=>{
    if(!pkEnabled(pk) || !pkInDistRange(pk)) return;
    const x=fracToViewer(pk.u), y=fracToViewer(pk.v), z=fracToViewer(pk.w);
    const isOrigin=(pk.label==='origin');
    const color = hexToThree(pkColor(pk));
    const opacity = isOrigin ? 0.9 : (pk.involves_H ? 0.45 : 0.78);
    const r = isOrigin ? rBase : rBase * peakRadiusScale(pk.weight);
    const geo=new THREE.SphereGeometry(r,10,10);
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    mesh.userData={peak:pk,isOrigin};
    peakGroup.add(mesh);
    peakSpheres.push(mesh);
  });
  pivot.add(peakGroup);
}

// ── Contours ──────────────────────────────────────────────────────────────
let contourGroup=null,intersectGroup=null,globalOpacity=.72;
function buildContours(){
  if(!volumeData)return;
  if(contourGroup){pivot.remove(contourGroup);contourGroup.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});}
  if(intersectGroup){pivot.remove(intersectGroup);intersectGroup.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});}
  contourGroup=new THREE.Group();intersectGroup=new THREE.Group();
  const nLvls=parseInt(document.getElementById('sLvls').value);
  const tMin=parseInt(document.getElementById('sMin').value)/100;
  const tMax=parseInt(document.getElementById('sMax').value)/100;
  const nSlices=parseInt(document.getElementById('sSlices').value);
  const stackAxis=document.getElementById('selAxis').value;
  const sliceAx=document.getElementById('selSliceAxis').value;
  const sliceIdx=parseInt(document.getElementById('sSlicePos').value);
  const levels=[];for(let l=0;l<nLvls;l++)levels.push(tMin+(tMax-tMin)*(l/(nLvls-1||1)));
  function addStack(sAxis){
    const Ns=sAxis==='x'?volNX:sAxis==='y'?volNY:volNZ;
    for(let si=0;si<nSlices;si++){
      const s=Math.round(si/(nSlices-1||1)*(Ns-1));
      const frac=Ns>1?s/(Ns-1):0;
      const isIntersect=(sAxis===sliceAx&&s===sliceIdx);
      const{data:sl,na,nb}=extractSlice(sAxis,s);
      for(let li=0;li<levels.length;li++){
        const thr=levels[li],t=li/(levels.length-1||1);
        const segs=marchingSquares(sl,na,nb,thr);if(!segs.length)continue;
        const pts=[];for(const[x1,y1,x2,y2]of segs){pts.push(sliceTo3D(sAxis,frac,x1,y1));pts.push(sliceTo3D(sAxis,frac,x2,y2));}
        const geo=new THREE.BufferGeometry().setFromPoints(pts);
        const col=levelColorThree(t);
        if(isIntersect){const bc=new THREE.Color(Math.min(1,col.r*.3+.8),Math.min(1,col.g*.3+.8),Math.min(1,col.b*.3+.8));intersectGroup.add(new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:bc,transparent:false,depthTest:false})));}
        else{contourGroup.add(new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:globalOpacity})));}
      }
    }
  }
  if(stackAxis==='z'||stackAxis==='zx')addStack('z');
  if(stackAxis==='x'||stackAxis==='zx')addStack('x');
  // Highlighted intersection slice
  const Ns2=sliceAx==='x'?volNX:sliceAx==='y'?volNY:volNZ;
  const frac2=Ns2>1?sliceIdx/(Ns2-1):0;
  const{data:iSl,na:iNa,nb:iNb}=extractSlice(sliceAx,sliceIdx);
  for(let li=0;li<levels.length;li++){
    const thr=levels[li],t=li/(levels.length-1||1);
    const segs=marchingSquares(iSl,iNa,iNb,thr);if(!segs.length)continue;
    const pts=[];for(const[x1,y1,x2,y2]of segs){pts.push(sliceTo3D(sliceAx,frac2,x1,y1));pts.push(sliceTo3D(sliceAx,frac2,x2,y2));}
    const col=levelColorThree(t);
    const bc=new THREE.Color(Math.min(1,col.r*.2+.85),Math.min(1,col.g*.2+.85),Math.min(1,col.b*.2+.85));
    intersectGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:bc,transparent:false,depthTest:false})));
  }
  pivot.add(contourGroup);pivot.add(intersectGroup);
  updatePlane3D();redrawSlice2D();
}

// ── 2D slice ──────────────────────────────────────────────────────────────
let zoom2d=1,pan2dx=0,pan2dy=0,currentSlice=null;
let measureMode=false,measState=0,measP1=null,measP2=null,measLive=null;
let panDragging=false,panStart={x:0,y:0},panOrigin={x:0,y:0};
let rightDragging=false,rightStart={x:0,y:0},rightOrigin={x:0,y:0};

function resetZoomPan(){zoom2d=1;pan2dx=0;pan2dy=0;redrawSlice2D();}

// Convert pixel fraction [0,1] → fractional coord [-0.5, +0.5]
function pixFracToFrac(f){return f - 0.5;}

function canvasToFrac(e){
  const wrap=document.getElementById('pip-canvas-wrap'),r=wrap.getBoundingClientRect(),W=wrap.clientWidth;
  return{fx:Math.max(0,Math.min(1,(e.clientX-r.left-pan2dx)/(W*zoom2d))),fy:Math.max(0,Math.min(1,(e.clientY-r.top-pan2dy)/(W*zoom2d)))};
}
function canvasPx(e){const wrap=document.getElementById('pip-canvas-wrap'),r=wrap.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function fracToPx(f,N){return Math.min(N-1,Math.max(0,Math.round(f*(N-1))));}

function redrawSlice2D(){
  if(!volumeData)return;
  const cv=document.getElementById('sliceCanvas'),wrap=document.getElementById('pip-canvas-wrap');
  const W=wrap.clientWidth;if(!W)return;
  cv.width=W;cv.height=W;cv.style.width=W+'px';cv.style.height=W+'px';
  const ctx=cv.getContext('2d');
  const ax=document.getElementById('selSliceAxis').value;
  const s=parseInt(document.getElementById('sSlicePos').value);
  const{data:sl,na,nb}=extractSlice(ax,s);
  currentSlice={data:sl,na,nb};
  ctx.save();ctx.translate(pan2dx,pan2dy);ctx.scale(zoom2d,zoom2d);
  const tw=W/na+1,th=W/nb+1;

  // Draw heatmap
  for(let i=0;i<na;i++)for(let j=0;j<nb;j++){
    const[r,g,b]=hotRGB(sl[i*nb+j]);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(i/na*W,j/nb*W,tw,th);
  }

  // Contour lines
  const nLvls=parseInt(document.getElementById('sLvls').value);
  const tMin=parseInt(document.getElementById('sMin').value)/100;
  const tMax=parseInt(document.getElementById('sMax').value)/100;
  for(let li=0;li<nLvls;li++){
    const thr=tMin+(tMax-tMin)*(li/(nLvls-1||1)),t=li/(nLvls-1||1);
    ctx.strokeStyle=levelColorCSS(t);ctx.lineWidth=1.5/zoom2d;ctx.beginPath();
    for(const[x1,y1,x2,y2]of marchingSquares(sl,na,nb,thr)){ctx.moveTo(x1*W,y1*W);ctx.lineTo(x2*W,y2*W);}
    ctx.stroke();
  }

  // Peaks overlay in 2D
  if(peaksData){
    const pkR=parseInt(document.getElementById('sPkR').value);
    const sliceS=parseInt(document.getElementById('sSlicePos').value);
    const Ns=ax==='x'?volNX:ax==='y'?volNY:volNZ;
    const sliceFrac=Ns>1?sliceS/(Ns-1):0; // [0,1]
    const tol=1.5/(Ns>1?Ns-1:1); // ~1.5 pixels in frac space

    peaksData.forEach(pk=>{
      if(!pkEnabled(pk)||!pkInDistRange(pk))return;
      const sliceCoord=ax==='x'?pk.u:ax==='y'?pk.v:pk.w;
      if(Math.abs(sliceCoord-sliceFrac)>tol)return;
      const fa=ax==='x'?pk.v:pk.u;
      const fb=ax==='x'?pk.w:(ax==='y'?pk.w:pk.v);
      const pxc=fa*W, pyc=fb*W;
      const isOrigin=(pk.label==='origin');
      // Use same per-pair colour as 3D view
      const hexCol=pkColor(pk);
      const rr=parseInt(hexCol.slice(1,3),16);
      const gg=parseInt(hexCol.slice(3,5),16);
      const bb=parseInt(hexCol.slice(5,7),16);
      const strokeA=isOrigin?0.95:(pk.involves_H?0.55:0.9);
      const fillA=isOrigin?0.3:0.18;
      const scale2d = isOrigin ? 1.0 : peakRadiusScale(pk.weight);
      ctx.beginPath();
      ctx.arc(pxc,pyc,(pkR*scale2d)/zoom2d,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${rr},${gg},${bb},${strokeA})`;
      ctx.fillStyle=`rgba(${rr},${gg},${bb},${fillA})`;
      ctx.lineWidth=1.5/zoom2d;
      ctx.fill();ctx.stroke();
    });
  }

  // Axis labels — show fractional coords
  const axLbls={x:['v','w'],y:['u','w'],z:['u','v']};
  const[la,lb]=axLbls[ax];
  ctx.restore(); // draw labels without zoom transform for clean text
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='10px monospace';
  ctx.fillText(la+'→  [−0.5 → +0.5]',4,W-4);
  ctx.fillText(lb+'↓',3,12);

  // Measure overlay
  const toS=f=>({x:f.fx*W*zoom2d+pan2dx,y:f.fy*W*zoom2d+pan2dy});
  if(measP1){
    const ss=toS(measP1);
    const p1i=fracToPx(measP1.fx,na),p1j=fracToPx(measP1.fy,nb);
    // Show fractional coords in labels
    const p1fa=pixFracToFrac(measP1.fx).toFixed(2),p1fb=pixFracToFrac(measP1.fy).toFixed(2);
    ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(ss.x,ss.y,3.5,0,Math.PI*2);ctx.fill();
    drawLabel(ctx,`(${p1fa},${p1fb})`,ss.x,ss.y,{offsetX:-6,offsetY:-2,align:'right',fontSize:9});
    const endF=measP2||measLive;
    if(endF){
      const se=toS(endF);
      const p2fa=pixFracToFrac(endF.fx).toFixed(2),p2fb=pixFracToFrac(endF.fy).toFixed(2);
      const di=fracToPx(endF.fx,na)-p1i,dj=fracToPx(endF.fy,nb)-p1j,pxD=Math.sqrt(di*di+dj*dj);
      ctx.strokeStyle='#44ff88';ctx.lineWidth=1.8;ctx.setLineDash([5,3]);
      ctx.beginPath();ctx.moveTo(ss.x,ss.y);ctx.lineTo(se.x,se.y);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(se.x,se.y,3.5,0,Math.PI*2);ctx.fill();
      const ex_off=se.x>=ss.x?8:-8,ey_off=se.y>=ss.y?14:-6;
      drawLabel(ctx,`(${p2fa},${p2fb})`,se.x,se.y,{offsetX:ex_off,offsetY:ey_off,fontSize:9});
      const mx2=(ss.x+se.x)/2,my2=(ss.y+se.y)/2;
      const lx=se.x-ss.x,ly=se.y-ss.y,ll=Math.sqrt(lx*lx+ly*ly)||1;
      drawLabel(ctx,`${pxD.toFixed(1)} px`,mx2,my2,{offsetX:-ly/ll*16,offsetY:lx/ll*16+10,align:'center',fontSize:10});
      document.getElementById('pip-measure-info').style.display='block';
      document.getElementById('pip-measure-info').textContent=`(${p1fa},${p1fb})→(${p2fa},${p2fb})  ${pxD.toFixed(1)} px`;
    }
    if(measState===1&&!measLive){ctx.strokeStyle='rgba(68,255,136,.35)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ss.x,ss.y,8,0,Math.PI*2);ctx.stroke();}
  }
}

const wrap=document.getElementById('pip-canvas-wrap');
wrap.addEventListener('mousemove',e=>{
  if(!volumeData)return;
  const{fx,fy}=canvasToFrac(e);
  if(currentSlice){
    const gi=Math.min(currentSlice.na-1,Math.floor(fx*(currentSlice.na-1)));
    const gj=Math.min(currentSlice.nb-1,Math.floor(fy*(currentSlice.nb-1)));
    const v=currentSlice.data[gi*currentSlice.nb+gj];
    // Show fractional coords [-0.5, +0.5]
    const fa=pixFracToFrac(fx).toFixed(2), fb=pixFracToFrac(fy).toFixed(2);
    document.getElementById('readoutXY').textContent=`(${fa}, ${fb})`;
    document.getElementById('readoutVal').textContent=`ρ=${v.toFixed(3)}`;
  }
  if(measureMode&&measState===1&&measP1){measLive=canvasToFrac(e);redrawSlice2D();}
  if(panDragging&&!measureMode){const px=canvasPx(e);pan2dx=panOrigin.x+(px.x-panStart.x);pan2dy=panOrigin.y+(px.y-panStart.y);redrawSlice2D();}
  if(rightDragging){const px=canvasPx(e);pan2dx=rightOrigin.x+(px.x-rightStart.x);pan2dy=rightOrigin.y+(px.y-rightStart.y);redrawSlice2D();}
});
wrap.addEventListener('mouseleave',()=>{
  document.getElementById('readoutXY').textContent='—';document.getElementById('readoutVal').textContent='—';
  if(measureMode&&measState===1){measLive=null;redrawSlice2D();}
});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();e.stopPropagation();
  const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const factor=e.deltaY<0?1.15:1/1.15,newZoom=Math.max(.4,Math.min(20,zoom2d*factor));
  pan2dx=mx-(mx-pan2dx)*newZoom/zoom2d;pan2dy=my-(my-pan2dy)*newZoom/zoom2d;zoom2d=newZoom;redrawSlice2D();
},{passive:false});
wrap.addEventListener('mousedown',e=>{
  e.stopPropagation();const px=canvasPx(e);
  if(e.button===0){
    if(measureMode){
      if(measState===0||measState===2){measP1=canvasToFrac(e);measP2=null;measLive=null;measState=1;document.getElementById('pip-measure-info').style.display='none';redrawSlice2D();}
      else if(measState===1){measP2=canvasToFrac(e);measLive=null;measState=2;redrawSlice2D();}
    }else{panDragging=true;panStart={x:px.x,y:px.y};panOrigin={x:pan2dx,y:pan2dy};}
  }
  if(e.button===2){rightDragging=true;rightStart={x:px.x,y:px.y};rightOrigin={x:pan2dx,y:pan2dy};e.preventDefault();}
});
window.addEventListener('mouseup',e=>{if(e.button===0)panDragging=false;if(e.button===2)rightDragging=false;});
wrap.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(measureMode){measP1=null;measP2=null;measLive=null;measState=0;document.getElementById('pip-measure-info').style.display='none';redrawSlice2D();}
});
document.getElementById('homeBtn').onclick=resetZoomPan;
document.getElementById('measureBtn').onclick=function(){
  measureMode=!measureMode;this.classList.toggle('active',measureMode);wrap.style.cursor=measureMode?'crosshair':'default';
  if(!measureMode){measP1=null;measP2=null;measLive=null;measState=0;document.getElementById('pip-measure-info').style.display='none';redrawSlice2D();}
};

// ── PiP drag & resize ─────────────────────────────────────────────────────
const pip=document.getElementById('pip'),topbar=document.getElementById('pip-topbar'),resHandle=document.getElementById('pip-resize-handle');
let pipMove=false,pipRes=false,pmx=0,pmy=0,pox=0,poy=0,prw=0,pright=0,pbottom=0;
topbar.addEventListener('mousedown',e=>{if(resHandle.contains(e.target)||e.target.closest('.pip-btn'))return;pipMove=true;pmx=e.clientX;pmy=e.clientY;pox=pip.offsetLeft;poy=pip.offsetTop;e.preventDefault();e.stopPropagation();});
resHandle.addEventListener('mousedown',e=>{pipRes=true;pmx=e.clientX;pmy=e.clientY;prw=pip.offsetWidth;pright=pip.offsetLeft+pip.offsetWidth;pbottom=pip.offsetTop+pip.offsetHeight;e.preventDefault();e.stopPropagation();});
window.addEventListener('mousemove',e=>{
  if(pipMove){const maxL=window.innerWidth-pip.offsetWidth-4,maxT=window.innerHeight-pip.offsetHeight-4;pip.style.left=Math.max(0,Math.min(maxL,pox+(e.clientX-pmx)))+'px';pip.style.top=Math.max(0,Math.min(maxT,poy+(e.clientY-pmy)))+'px';pip.style.right='auto';pip.style.bottom='auto';}
  if(pipRes){const nw=Math.max(100,Math.min(500,prw-(e.clientX-pmx)));pip.style.left=Math.max(0,pright-nw)+'px';pip.style.top=Math.max(0,pbottom-nw)+'px';pip.style.right='auto';pip.style.bottom='auto';pip.style.width=nw+'px';document.getElementById('pip-canvas-wrap').style.height=nw+'px';document.getElementById('sPip').value=nw;document.getElementById('vPip').textContent=nw;redrawSlice2D();}
});
window.addEventListener('mouseup',()=>{pipMove=false;pipRes=false;});
document.getElementById('sPip').oninput=function(){const s=+this.value;pip.style.width=s+'px';document.getElementById('pip-canvas-wrap').style.height=s+'px';document.getElementById('vPip').textContent=s;redrawSlice2D();};
document.getElementById('pip-canvas-wrap').style.height='220px';

// ── Trackball — rotation + shift-drag pan + scroll zoom ──────────────────
function projectOnSphere(x,y,W,H){
  const nx=(2*x-W)/Math.min(W,H),ny=-(2*y-H)/Math.min(W,H);
  const d=Math.sqrt(nx*nx+ny*ny);
  const nz=d<=1/Math.SQRT2?Math.sqrt(1-d*d):1/(2*d);
  const len=Math.sqrt(nx*nx+ny*ny+nz*nz);
  return new THREE.Vector3(nx/len,ny/len,nz/len);
}

let isDrag=false,isPan=false,lastSph=null,lastPanPos=null,autoRot=true;
const autoQ=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),.004);

c3d.addEventListener('mousedown',e=>{
  if(pip.contains(e.target))return;
  autoRot=false;document.getElementById('chkRot').checked=false;
  if(e.shiftKey||e.button===1){
    // Pan: shift+LMB or middle mouse
    isPan=true;lastPanPos={x:e.clientX,y:e.clientY};
    c3d.style.cursor='move';
  }else if(e.button===0){
    isDrag=true;
    const r=c3d.getBoundingClientRect();
    lastSph=projectOnSphere(e.clientX-r.left,e.clientY-r.top,r.width,r.height);
    c3d.style.cursor='grabbing';
  }
});
window.addEventListener('mouseup',()=>{isDrag=false;isPan=false;c3d.style.cursor='grab';});
window.addEventListener('mousemove',e=>{
  if(pipMove||pipRes||panDragging||rightDragging)return;
  if(isPan){
    // Pan camera target in screen plane
    const dx=e.clientX-lastPanPos.x, dy=e.clientY-lastPanPos.y;
    lastPanPos={x:e.clientX,y:e.clientY};
    const panSpeed=0.002*orthoSize*2;
    // get camera right and up vectors
    const right=new THREE.Vector3();
    const up=new THREE.Vector3();
    cam.getWorldDirection(new THREE.Vector3()); // ensure matrix updated
    right.setFromMatrixColumn(cam.matrixWorld,0);
    up.setFromMatrixColumn(cam.matrixWorld,1);
    camTarget.addScaledVector(right,-dx*panSpeed);
    camTarget.addScaledVector(up,dy*panSpeed);
    updateCamLookAt();
  }else if(isDrag&&lastSph){
    const r=c3d.getBoundingClientRect();
    const cur=projectOnSphere(e.clientX-r.left,e.clientY-r.top,r.width,r.height);
    const axis=new THREE.Vector3().crossVectors(lastSph,cur);
    const dot=Math.max(-1,Math.min(1,lastSph.dot(cur)));
    if(axis.lengthSq()>1e-10)pivot.quaternion.premultiply(new THREE.Quaternion().setFromAxisAngle(axis.normalize(),Math.acos(dot)*2.5));
    lastSph=cur;
  }
});
c3d.addEventListener('wheel',e=>{
  const aspect=window.innerWidth/window.innerHeight;
  orthoSize=Math.max(0.2,Math.min(3.0,orthoSize+e.deltaY*0.001));
  cam.left=-orthoSize*aspect; cam.right=orthoSize*aspect;
  cam.top=orthoSize; cam.bottom=-orthoSize;
  cam.updateProjectionMatrix();
  e.preventDefault();
},{passive:false});
c3d.style.cursor='grab';

// ── Rotation sliders ──────────────────────────────────────────────────────
function applyRotSliders(){
  const rx=THREE.MathUtils.degToRad(parseFloat(document.getElementById('rX').value));
  const ry=THREE.MathUtils.degToRad(parseFloat(document.getElementById('rY').value));
  const rz=THREE.MathUtils.degToRad(parseFloat(document.getElementById('rZ').value));
  document.getElementById('vRX').textContent=document.getElementById('rX').value+'°';
  document.getElementById('vRY').textContent=document.getElementById('rY').value+'°';
  document.getElementById('vRZ').textContent=document.getElementById('rZ').value+'°';
  pivot.rotation.set(rx,ry,rz);
  pivot.quaternion.setFromEuler(pivot.rotation);
}
['rX','rY','rZ'].forEach(id=>document.getElementById(id).addEventListener('input',applyRotSliders));

// ── Raycasting for hover tooltips on peaks ────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse2d=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
c3d.addEventListener('mousemove',e=>{
  if(!peakSpheres.length){tooltip.style.display='none';return;}
  const r=c3d.getBoundingClientRect();
  mouse2d.x=((e.clientX-r.left)/r.width)*2-1;
  mouse2d.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse2d,cam);
  const hits=raycaster.intersectObjects(peakSpheres);
  if(hits.length){
    const pk=hits[0].object.userData.peak;
    const uf=(pk.u-0.5).toFixed(3),vf=(pk.v-0.5).toFixed(3),wf=(pk.w-0.5).toFixed(3);
    let html=`<b>${pk.label||pk.atom1+'–'+pk.atom2}</b><br>`;
    html+=`u=${uf}  v=${vf}  w=${wf}<br>`;
    if(pk.distance!=null)html+=`d = ${pk.distance.toFixed(3)} Å`;
    if(pk.weight_raw!=null)html+=`<br>Z² = ${pk.weight_raw}  (weight ${(pk.weight*100).toFixed(0)}%)`;
    if(pk.involves_H)html+=`<br><span style="color:#ffaa44">involves H</span>`;
    tooltip.innerHTML=html;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+14)+'px';
    tooltip.style.top=(e.clientY-10)+'px';
  }else{
    tooltip.style.display='none';
  }
});
c3d.addEventListener('mouseleave',()=>tooltip.style.display='none');

// ── Animate ───────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  if(autoRot)pivot.quaternion.premultiply(autoQ);
  renderer.render(scene,cam);
}
animate();

// Legend panel drag
(function(){
  const panel=document.getElementById('legend-panel');
  const bar=document.getElementById('legend-topbar');
  let drag=false,mx=0,my=0,ox=0,oy=0;
  bar.addEventListener('mousedown',e=>{
    if(e.target.id==='legend-toggle')return;
    drag=true;mx=e.clientX;my=e.clientY;ox=panel.offsetLeft;oy=panel.offsetTop;
    e.preventDefault();e.stopPropagation();
  });

    if(!drag)return;
    panel.style.left=Math.max(0,ox+(e.clientX-mx))+'px';

document.getElementById('selSliceAxis').onchange=function(){
  const ax=this.value,Ns=ax==='x'?volNX:ax==='y'?volNY:volNZ;
